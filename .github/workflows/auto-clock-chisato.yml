name: Auto Clock Chisato

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-vercel-cron-endpoint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call auto-clock endpoint
        env:
          AUTO_CLOCK_URL: https://oa.td88.co.uk/api/jobs/auto-clock-chisato
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing GitHub Actions secret: CRON_SECRET"
            exit 1
          fi
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$AUTO_CLOCK_URL"
